<div th:fragment="content">

<style>
    .content-center{
        display:flex;
        justify-content:center;
        padding:40px 0;
    }

    .customer-card{
        width:650px;
        background: linear-gradient(135deg,#ffe6f0,#e6f0ff);
        padding:35px;
        border-radius:22px;
        box-shadow:0 18px 45px rgba(0,0,0,.25);
    }

    .customer-card h3{
        margin-bottom:25px;
        color:#1f2937;
        display:flex;
        align-items:center;
        gap:10px;
    }

    /* GRID FORM */
    .form-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:18px;
    }

    .form-group{
        display:flex;
        flex-direction:column;
    }

    .form-group.full{
        grid-column:1 / -1;
    }

    label{
        font-size:13px;
        font-weight:600;
        margin-bottom:6px;
        color:#374151;
    }

    input, textarea, select{
        padding:12px 14px;
        border-radius:18px;
        border:none;
        background:#f5f5f5;
        font-size:14px;
    }

    textarea{
        resize:none;
        min-height:90px;
    }

    /* ACTIONS */
    .actions{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-top:25px;
    }

    .save-btn{
        padding:12px 30px;
        border:none;
        border-radius:30px;
        background: linear-gradient(135deg,#6a82fb,#fc5c7d);
        color:#fff;
        font-weight:600;
        cursor:pointer;
        box-shadow:0 8px 20px rgba(0,0,0,.2);
    }

    .back-btn{
        text-decoration:none;
        font-size:14px;
        color:#374151;
        display:flex;
        align-items:center;
        gap:6px;
    }
</style>

<div class="content-center">

    <div class="customer-card">

        <h3>
            <i class="fa-solid fa-user-plus"></i>
            Add Customer
        </h3>

        <form th:action="@{/customers/save}" th:object="${customer}" method="post">

            <div class="form-grid">

                <div class="form-group">
                    <label>Customer Name *</label>
                    <input type="text"
                           th:field="*{name}"
                           placeholder="Enter customer name"
                           required>
                </div>

                <div class="form-group">
                    <label>Phone *</label>
                    <input type="text"
                           th:field="*{phone}"
                           placeholder="Enter phone number">
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email"
                           th:field="*{email}"
                           placeholder="Enter email">
                </div>

              <div class="form-group">
    <label>Status</label>
    <select th:field="*{status}">
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
    </select>
</div>

                <div class="form-group full">
                    <label>Address</label>
                    <textarea th:field="*{address}"
                              placeholder="Enter address"></textarea>
                </div>

            </div>

            <div class="actions">
                <a href="/customers" class="back-btn">
                    <i class="fa-solid fa-arrow-left"></i> Back to Customer List
                </a>

                <button type="submit" class="save-btn">
                    Save Customer
                </button>
            </div>

        </form>

    </div>

</div>

</div>
