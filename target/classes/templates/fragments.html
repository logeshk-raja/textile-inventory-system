<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <head>
    <!-- ✅ BOOTSTRAP CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- ✅ BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f9fafb;
        }
            .brand {
            display: flex; align-items: center; gap: 10px;
            font-size: 18px; font-weight: 600;
            padding: 15px 25px; color: white;
        }

        .brand i { font-size: 22px; color: #60a5fa; }

        .topbar {
            background: #000; color: white;
            height: 55px; display: flex;
            align-items: center; justify-content: flex-end;
            padding: 0 25px;
        }

        .topbar a { color: white; text-decoration: none; font-weight: 500; }

        .sidebar {
            width: 230px; background: #1f2937; color: white;
            min-height: 100vh; display: flex;
            flex-direction: column; justify-content: space-between;
        }

        .sidebar-menu input {
            width: 80%; margin: 10px auto; padding: 8px;
            border-radius: 20px; border: none;
        }

        .sidebar a {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 25px; color: white; text-decoration: none;
        }

        .sidebar a:hover { background: #374151; }

        .sidebar-footer {
            padding: 15px 25px;
            border-top: 1px solid #374151;
        }

        .sidebar-footer a {
            color: #f87171; text-decoration: none; font-weight: 500;
        }

        .main { flex: 1; }
        .content { padding: 25px; }
    </style>
</head>

<body>

<!-- 🔥 MAIN LAYOUT -->
<div th:fragment="layout(content)">
    <div style="display:flex;">

        <!-- Sidebar -->
        <div th:replace="::sidebar"></div>

        <!-- Main -->
        <div class="main">
            <!-- Topbar -->
            <div th:replace="::topbar"></div>

            <!-- Page Content -->
            <div class="content" th:replace="${content}"></div>
        </div>

    </div>
</div>

<!-- TOPBAR -->
<div th:fragment="topbar">
    <div class="topbar">
        <a href="/admin/logout">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </div>
</div>

<!-- SIDEBAR -->
<div th:fragment="sidebar">
    <div class="sidebar">

        <div>
            <div class="brand">
                <i class="bi bi-box-seam-fill"></i>
                <span>Textile Inventory</span>
            </div>

            <div class="sidebar-menu">
                <input type="text" placeholder="Search menu...">

                <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a href="/admin/inventory"><i class="bi bi-boxes"></i> Inventory</a>
                <a href="/categories"><i class="bi bi-tags-fill"></i> Categories</a>
                <a href="/admin/orders"><i class="bi bi-cart-check"></i> Orders</a>
                <a href="/customers"><i class="bi bi-people"></i> Customers</a>
                <a href="/billing"><i class="bi bi-receipt"></i> Billing</a>
                <a href="/suppliers"><i class="bi bi-truck"></i> Suppliers</a>
                <a href="/admin/reports"><i class="bi bi-bar-chart"></i> Reports</a>
            </div>
        </div>

        <div class="sidebar-footer">
            <a href="/admin/logout">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>

    </div>
</div>

</body>
</html>
