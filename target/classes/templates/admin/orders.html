<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>All Orders</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<h2>All Orders</h2>

<div style="margin-bottom:15px; text-align:right;">

<a href="/admin/orders/download" class="btn btn-success">
Download Orders Report
</a>

</div>

<table class="table table-bordered table-striped">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>User</th>
<th>Product</th>
<th>Qty</th>
<th>Total</th>
<th>Payment</th>
<th>Date</th>
<th>Status</th>
</tr>
</thead>

<tbody>

<tr th:if="${orders == null or #lists.isEmpty(orders)}">
<td colspan="8" class="text-center">No Orders Found</td>
</tr>

<tr th:each="o : ${orders}">

<td th:text="${o.id}"></td>

<td th:text="${o.user != null ? o.user.name : 'Unknown'}"></td>

<td th:text="${o.product != null ? o.product.productName : 'Product Not Available'}"></td>

<td th:text="${o.quantity}"></td>

<td th:text="${o.totalPrice}"></td>

<td th:text="${o.paymentMethod}"></td>

<td th:text="${o.orderDate}"></td>

<td th:text="${o.status}"></td>

</tr>

</tbody>

</table>
</body>
</html>
