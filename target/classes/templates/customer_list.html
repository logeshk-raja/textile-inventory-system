<div th:fragment="content">

<style>
    .content-center{
        display:flex;
        justify-content:center;
        padding:40px 0;
    }

    .customer-wrapper{
        width:1050px;
        background: linear-gradient(135deg,#ffe6f0,#e6f0ff);
        padding:30px;
        border-radius:22px;
        box-shadow:0 18px 45px rgba(0,0,0,.25);
    }

    .customer-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
    }

    .customer-header h3{
        margin:0;
        font-size:22px;
        color:#1f2937;
        display:flex;
        align-items:center;
        gap:10px;
    }

    .add-btn{
        padding:10px 22px;
        border-radius:25px;
        background: linear-gradient(135deg,#6a82fb,#fc5c7d);
        color:#fff;
        text-decoration:none;
        font-weight:600;
    }

    table{
        width:100%;
        border-collapse:collapse;
        background:#fff;
        border-radius:16px;
        overflow:hidden;
    }

    thead{
        background:#6366f1;
    }

    th{
        padding:14px;
        color:#fff;
        font-size:14px;
        text-align:center;
    }

    td{
        padding:13px;
        text-align:center;
        font-size:14px;
        color:#374151;
        border-bottom:1px solid #e5e7eb;
    }

    tr:nth-child(even){ background:#f9fafb; }
    tr:hover{ background:#eef2ff; }

    /* STATUS BADGES */
    .status{
        padding:5px 14px;
        border-radius:14px;
        font-size:12px;
        font-weight:600;
        color:#fff;
        display:inline-block;
    }

    .active{
        background:#22c55e;
    }

    .inactive{
        background:#ef4444;
    }

    .delete-btn{
        padding:6px 16px;
        border-radius:20px;
        background:#ef4444;
        color:#fff;
        text-decoration:none;
        font-size:13px;
    }
</style>

<div class="content-center">

    <div class="customer-wrapper">

        <div class="customer-header">
            <h3>
                <i class="fa-solid fa-users"></i>
                Customers
            </h3>

            <a href="/customers/add" class="add-btn">
                <i class="fa-solid fa-user-plus"></i> Add Customer
            </a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Address</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="c : ${customers}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.name}"></td>
                    <td th:text="${c.phone}"></td>
                    <td th:text="${c.email}"></td>
                    <td th:text="${c.address}"></td>

                    <!-- STATUS COLUMN -->
                    <td>
                        <span th:text="${c.status}"
                              th:classappend="${c.status == 'Inactive'} ? 'status inactive' : 'status active'">
                            Active
                        </span>
                    </td>

                    <td>
                        <a th:href="@{/customers/delete/{id}(id=${c.id})}"
                           class="delete-btn"
                           onclick="return confirm('Delete this customer?')">
                            Delete
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(customers)}">
                    <td colspan="7" style="padding:20px;color:#6b7280;">
                        No customers found
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

</div>

</div>
