<!-- product_list.html -->

<div th:fragment="content">

    <style>
        .product-card{
            background: linear-gradient(135deg,#ffe6f0,#e6f0ff);
            border-radius:22px;
            padding:30px;
            box-shadow:0 18px 45px rgba(0,0,0,.25);
            max-width:1150px;
            margin:0 auto;
        }

        .product-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:15px;
            margin-bottom:25px;
        }

        .product-title{
            display:flex;
            align-items:center;
            gap:10px;
            font-size:22px;
            font-weight:600;
            color:#1f2937;
        }

        .product-title i{
            color:#6366f1;
            font-size:22px;
        }

        .product-actions{
            display:flex;
            gap:12px;
        }

        .add-btn{
            background: linear-gradient(135deg,#6a82fb,#fc5c7d);
            color:#fff;
            padding:10px 20px;
            border-radius:25px;
            text-decoration:none;
            font-weight:600;
            display:flex;
            align-items:center;
            gap:6px;
            box-shadow:0 8px 20px rgba(0,0,0,.2);
        }

        .download-btn{
            background: linear-gradient(135deg,#10b981,#34d399);
            color:#fff;
            padding:10px 20px;
            border-radius:25px;
            text-decoration:none;
            font-weight:600;
            display:flex;
            align-items:center;
            gap:6px;
            box-shadow:0 8px 20px rgba(0,0,0,.2);
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:15px;
            background:#fff;
            border-radius:16px;
            overflow:hidden;
        }

        table thead{
            background:#6366f1;
        }

        table th{
            padding:14px;
            font-size:14px;
            color:#fff;
            font-weight:600;
            text-align:center;
        }

        table td{
            padding:13px;
            text-align:center;
            font-size:14px;
            color:#374151;
            border-bottom:1px solid #e5e7eb;
        }

        table tr:nth-child(even){
            background:#f9fafb;
        }

        table tr:hover{
            background:#eef2ff;
        }

        .action-btn{
            padding:6px 14px;
            border-radius:20px;
            text-decoration:none;
            font-size:13px;
            margin:0 4px;
            display:inline-block;
            color:#fff;
            font-weight:500;
        }

        .edit{ background:#f59e0b; }
        .delete{ background:#ef4444; }
    </style>

    <div class="product-card">

        <!-- HEADER -->
        <div class="product-header">
            <div class="product-title">
                <i class="fa-solid fa-boxes-stacked"></i>
                <span>Product Inventory</span>
            </div>

            <div class="product-actions">
                <a href="/products/download" class="download-btn">
                    <i class="fa-solid fa-download"></i> Download
                </a>

                <a href="/products/add" class="add-btn">
                    <i class="fa-solid fa-plus"></i> Add Product
                </a>
            </div>
        </div>

        <!-- TABLE -->
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Supplier</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="p : ${products}">
                    <td th:text="${p.id}">1</td>
                    <td th:text="${p.productName}">Product</td>

                    <!-- ✅ FIXED -->
                    <td th:text="${p.category.name}">Category</td>

                    <td th:text="${p.quantity}">0</td>
                    <td th:text="${p.price}">0</td>

                    <!-- ✅ FIXED -->
                    <td th:text="${p.supplier.name}">Supplier</td>

                    <td>
                       <a th:href="@{/products/edit/{id}(id=${p.id})}"
   class="action-btn edit">
   Edit
</a>
                        <a th:href="@{/products/delete/{id}(id=${p.id})}"
                           class="action-btn delete"
                           onclick="return confirm('Are you sure?')">
                           Delete
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

</div>
