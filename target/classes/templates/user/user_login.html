<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Login | Inventory System</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body{
            margin:0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2874f0, #6a11cb);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .login-container{
            background:#ffffff;
            width:380px;
            padding:35px 30px;
            border-radius:12px;
            box-shadow:0 15px 40px rgba(0,0,0,0.2);
        }
        .login-container h2{
            text-align:center;
            margin-bottom:8px;
            color:#333;
        }
        .login-container p{
            text-align:center;
            color:#777;
            font-size:14px;
            margin-bottom:25px;
        }
        .form-group{
            margin-bottom:18px;
        }
        .form-group label{
            display:block;
            font-size:14px;
            margin-bottom:6px;
            color:#555;
        }
        .form-group input{
            width:100%;
            padding:11px 12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:14px;
            outline:none;
            transition:0.3s;
        }
        .form-group input:focus{
            border-color:#2874f0;
            box-shadow:0 0 5px rgba(40,116,240,0.3);
        }
        .login-btn{
            width:100%;
            padding:12px;
            background:#2874f0;
            color:#fff;
            border:none;
            border-radius:6px;
            font-size:15px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }
        .login-btn:hover{
            background:#1f5fd1;
        }
        .extra-links{
            margin-top:18px;
            text-align:center;
            font-size:14px;
        }
        .extra-links a{
            color:#2874f0;
            text-decoration:none;
            font-weight:500;
        }
        .extra-links a:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>User Login</h2>
    <p>Login to continue shopping</p>

    <form action="/user/login" method="post">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="extra-links">
        New User?
        <a href="/user/register">Create an Account</a>
    </div>
</div>

</body>
</html>
