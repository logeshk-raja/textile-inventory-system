<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Order Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f4f6f9;
font-family:Segoe UI;
}

/* 🔥 STEP FLOW */
.steps{
display:flex;
justify-content:center;
align-items:center;
margin:30px 0;
}

.step{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
}

.circle{
width:35px;
height:35px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
background:#d1d5db;
}

.circle.done{
background:#22c55e;
color:white;
}

.line{
width:80px;
height:3px;
background:#ccc;
}

/* CARD */
.container{
margin-top:40px;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}
</style>

</head>

<body>

<div class="container">

<!-- 🔥 STEP FLOW (ALL COMPLETED) -->
<div class="steps">

    <!-- STEP 1 -->
    <div class="step">
        <div class="circle done">✔</div>
        <small>Address</small>
    </div>

    <div class="line"></div>

    <!-- STEP 2 -->
    <div class="step">
        <div class="circle done">✔</div>
        <small>Order Summary</small>
    </div>

    <div class="line"></div>

    <!-- STEP 3 -->
    <div class="step">
        <div class="circle done">✔</div>
        <small>Payment</small>
    </div>

</div>

<!-- ================= ORDER DETAILS ================= -->
<div class="card p-4">

<h3 class="mb-4 text-center">Order Details</h3>

<table class="table table-bordered">

<tr>
<th>Order ID</th>
<td th:text="${order.id}"></td>
</tr>

<tr>
<th>Product</th>
<td th:text="${order.product != null ? order.product.productName : 'Product Not Available'}"></td>
</tr>

<tr>
<th>Price</th>
<td th:text="${order.product != null ? '₹ ' + order.product.price : 'N/A'}"></td>
</tr>

<tr>
<th>Quantity</th>
<td th:text="${order.quantity}"></td>
</tr>

<tr>
<th>Total</th>
<td th:text="'₹ ' + ${order.totalPrice}"></td>
</tr>

<tr>
<th>Payment</th>
<td th:text="${order.paymentMethod}"></td>
</tr>

<tr>
<th>Date</th>
<td th:text="${order.orderDate}"></td>
</tr>

<tr>
<th>Status</th>
<td th:text="${order.status}"></td>
</tr>

<tr>
<th>Delivery Address</th>
<td th:text="${address != null ? address : 'No address added'}"></td>
</tr>

</table>

<div class="text-center mt-3">
<a href="/user/orders" class="btn btn-primary">
← Back to My Orders
</a>
</div>

</div>

</div>

</body>
</html>
