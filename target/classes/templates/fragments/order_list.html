<!-- order_list.html (CONTENT ONLY) -->

<style>
.order-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 25px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    max-width: 1100px;
    margin: auto;
}

.order-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.order-header h2 {
    margin: 0;
    color: #111827;
    font-weight: 600;
}

.btn-group {
    display: flex;
    gap: 12px;
}

.download-btn {
    background: #10b981;
    color: white;
    padding: 10px 18px;
    border-radius: 25px;
    text-decoration: none;
    font-weight: 500;
}

.add-btn {
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: white;
    padding: 10px 18px;
    border-radius: 25px;
    text-decoration: none;
    font-weight: 500;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

thead {
    background: #f4f6fb;
}

th, td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #e5e7eb;
    font-size: 14px;
}

th {
    color: #374151;
    font-weight: 600;
}

tr:hover {
    background: #f9fafb;
}

.delete-btn {
    background: #ef4444;
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 13px;
}
</style>

<div class="order-card">

    <div class="order-header">
        <h2>📄 Orders</h2>

        <div class="btn-group">
            <a href="/orders/download" class="download-btn">⬇ Download</a>
            <a href="/orders/add" class="add-btn">＋ Add Order</a>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Product</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Total</th>
                <th>Date</th>
                <th>Status</th>                
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="o : ${orders}">
                <td th:text="${o.id}"></td>
                <td th:text="${o.customerName}"></td>
                <td th:text="${o.productName}"></td>
                <td th:text="${o.quantity}"></td>
                <td th:text="${o.price}"></td>
                <td th:text="${o.totalAmount}"></td>
                <td th:text="${o.orderDate}"></td>
                <td>
				    <span th:if="${o.status == 'PENDING'}"
				          class="badge bg-warning text-dark">
				        Pending
				    </span>
				
				    <span th:if="${o.status == 'DELIVERED'}"
				          class="badge bg-success">
				        Delivered
				    </span>
				</td>
                
                <td>
                    <a th:href="@{/orders/delete/{id}(id=${o.id})}"
                       class="delete-btn"
                       onclick="return confirm('Delete this order?')">
                       Delete
                    </a>
                </td>
                <td>
					    <a th:if="${o.status == 'PENDING'}"
					       th:href="@{/orders/deliver/{id}(id=${o.id})}"
					       class="btn btn-sm btn-success">
					        Mark Delivered
					    </a>
					
					    <span th:if="${o.status == 'DELIVERED'}"
					          class="text-muted">
					        ✓ Done
					    </span>
					</td>
                
            </tr>
        </tbody>
    </table>

</div>
