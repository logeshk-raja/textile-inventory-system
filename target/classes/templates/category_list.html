<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ✅ CONTENT FRAGMENT -->
<div th:fragment="content">

    <style>
        .category-wrapper{
            display:flex;
            justify-content:center;
            margin-top:30px;
        }

        .category-card{
            width:900px;
            background:linear-gradient(135deg,#fde6f3,#eef2ff);
            border-radius:22px;
            padding:28px;
            box-shadow:0 18px 45px rgba(0,0,0,.2);
        }

        .category-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .category-header h2{
            margin:0;
            color:#1f2937;
        }

        .add-btn{
            padding:10px 18px;
            border-radius:25px;
            background:linear-gradient(135deg,#6a82fb,#fc5c7d);
            color:#fff;
            text-decoration:none;
            font-size:14px;
            font-weight:600;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:#fff;
            border-radius:14px;
            overflow:hidden;
        }

        th{
            background:#6366f1;
            color:#fff;
            padding:14px;
            font-size:14px;
            text-align:center;
        }

        td{
            padding:14px;
            font-size:14px;
            text-align:center;
            color:#374151;
            border-bottom:1px solid #e5e7eb;
        }

        tr:nth-child(even){
            background:#f9fafb;
        }

        tr:hover{
            background:#eef2ff;
        }

        .empty{
            padding:20px;
            text-align:center;
            color:#6b7280;
        }
    </style>

    <div class="category-wrapper">

        <div class="category-card">

            <!-- HEADER -->
            <div class="category-header">
                <h2><i class="bi bi-tags"></i> Categories</h2>

                <a href="/categories/add" class="add-btn">
                    <i class="bi bi-plus"></i> Add Category
                </a>
            </div>

            <!-- TABLE -->
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Category Name</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="cat : ${categories}">
                    <td th:text="${cat.id}">1</td>
                    <td th:text="${cat.name}">Category</td>
                </tr>

                <tr th:if="${#lists.isEmpty(categories)}">
                    <td colspan="2" class="empty">
                        No categories found
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>
</html>
