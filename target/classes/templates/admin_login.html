<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Login</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a1c4fd, #c2e9fb);
        }

        .card{
            width:420px;
            padding:35px;
            border-radius:20px;
            background: linear-gradient(135deg, #ffe6f0, #e6f0ff);
            box-shadow:0 15px 40px rgba(0,0,0,0.25);
            text-align:center;
        }

        h2{
            color:#ff5fa2;
            margin-bottom:5px;
        }

        .subtitle{
            font-size:14px;
            color:#777;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px 14px;
            margin:12px 0;
            border-radius:25px;
            border:none;
            outline:none;
            background:#f5f5f5;
            font-size:14px;
        }

        .password-box{
            position:relative;
        }

        .toggle-btn{
            position:absolute;
            right:15px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            font-size:13px;
            color:#ff5fa2;
            user-select:none;
        }

        .forgot{
            text-align:right;
            font-size:13px;
            margin-top:-5px;
        }

        .forgot a{
            color:#ff5fa2;
            cursor:pointer;
            text-decoration:none;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:30px;
            font-size:16px;
            font-weight:600;
            color:#fff;
            cursor:pointer;
            background: linear-gradient(135deg, #6a82fb, #fc5c7d);
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        .error{
            color:red;
            font-size:14px;
            margin-top:10px;
        }

        .signup{
            margin-top:18px;
            font-size:13px;
            color:#555;
        }

        .signup span{
            color:#ff5fa2;
            font-weight:600;
            cursor:pointer;
        }
    </style>

    <script>
        function goToSignup(){
            window.location.href = "/admin/signup";
        }

        function goToForgot(){
            window.location.href = "/admin/forgot-password";
        }

        function togglePassword(){
            let pwd = document.getElementById("password");
            let text = document.getElementById("toggleText");

            if(pwd.type === "password"){
                pwd.type = "text";
                text.innerText = "Hide";
            }else{
                pwd.type = "password";
                text.innerText = "Show";
            }
        }
    </script>
</head>

<body>

<div class="card">
    <h2>Welcome Back</h2>
    <div class="subtitle">Login to your admin account</div>

    <form th:action="@{/admin/login}" method="post">
        <input type="text" name="username" placeholder="Username" required>

        <div class="password-box">
            <input type="password" id="password" name="password" placeholder="Password" required>
            <span class="toggle-btn" id="toggleText" onclick="togglePassword()">Show</span>
        </div>

        <div class="forgot">
            <a onclick="goToForgot()">Forgot password?</a>
        </div>

        <p class="error" th:text="${error}"></p>

        <button type="submit">Login</button>
    </form>

    <div class="signup">
        Don’t have an account?
        <span onclick="goToSignup()">Sign Up</span>
    </div>
</div>

</body>
</html>
