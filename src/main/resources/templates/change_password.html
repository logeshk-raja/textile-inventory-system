<!DOCTYPE html>
<html>
<head>
<title>Change Password</title>
<style>
body{height:100vh;display:flex;justify-content:center;align-items:center;
background:linear-gradient(135deg,#a1c4fd,#c2e9fb);font-family:Segoe UI;}
.card{width:400px;padding:30px;border-radius:20px;background:#fff;text-align:center;}
input,button{width:100%;padding:12px;margin:12px 0;border-radius:25px;border:none;}
button{background:#fc5c7d;color:#fff;font-weight:600;}
</style>
</head>
<body>

<div class="card">
<h2>Change Password</h2>
<form action="/admin/change-password" method="post">
<input type="password" placeholder="New Password" required>
<input type="password" placeholder="Confirm Password" required>
<button type="submit">Update Password</button>
</form>
</div>

</body>
</html>
