<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Payment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

/* 🔥 STEP UI */
.circle{
width:35px;
height:35px;
border-radius:50%;
background:#d1d5db;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.circle.active{
background:#2563eb;
color:white;
}

.circle.done{
background:#22c55e;
color:white;
}

/* CARD */
.payment-card{
width:420px;
margin:auto;
margin-top:40px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.pay-btn{
width:100%;
border-radius:25px;
}

</style>

</head>

<body>

<!-- 🔥 STEP INDICATOR -->
<div class="d-flex justify-content-center mt-4">

    <!-- STEP 1 -->
    <div class="text-center mx-3">
        <div class="circle done">✔</div>
        <small>Address</small>
    </div>

    <!-- STEP 2 -->
    <div class="text-center mx-3">
        <div class="circle done">✔</div>
        <small>Order Summary</small>
    </div>

    <!-- STEP 3 -->
    <div class="text-center mx-3">
        <div class="circle active">3</div>
        <small>Payment</small>
    </div>

</div>

<!-- PAYMENT CARD -->
<div class="payment-card">

<h3 class="text-center mb-4">Order Payment</h3>

<p><b>Product :</b> <span th:text="${product.productName}"></span></p>

<p><b>Price :</b> ₹<span th:text="${product.price}"></span></p>

<p><b>Quantity :</b> <span th:text="${quantity}"></span></p>

<p><b>Total :</b> ₹<span th:text="${total}"></span></p>

<form th:action="@{/user/pay}" method="post">

    <!-- PRODUCT ID -->
    <input type="hidden" name="productId" th:value="${product.id}">

    <!-- QUANTITY -->
    <input type="hidden" name="quantity" th:value="${quantity}">

    <!-- PAYMENT METHOD -->
    <div class="mb-3">
        <label>Select Payment Method</label>
        <select name="paymentMethod" class="form-control" required>
            <option value="">Select</option>
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
            <option value="Card">Card</option>
        </select>
    </div>

    <button type="submit" class="btn btn-success pay-btn">
        Pay Now
    </button>

</form>

</div>

</body>
</html>
