<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Products</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

.container{
margin-top:40px;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.table thead{
background:#2563eb;
color:white;
}

</style>

</head>


<body>

<div class="container">

<div class="card p-4">

<h3 class="mb-4">Available Products</h3>

<div class="table-responsive">

<table class="table table-hover">

<thead>

<tr>
<th>Product</th>
<th>Category</th>
<th>Price</th>
<th>Stock</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr th:each="p : ${products}">

<td th:text="${p.productName}"></td>

<td th:text="${p.category != null ? p.category.name : 'N/A'}"></td>

<td>
<span class="badge bg-success"
      th:text="'₹ ' + ${p.price}">
</span>
</td>

<td>

<span th:if="${p.quantity > 0}" class="badge bg-info"
      th:text="${p.quantity}"></span>

<span th:if="${p.quantity == 0}" class="badge bg-danger">
Out of Stock
</span>

</td>

<td>

<a th:if="${p.quantity > 0}"
   th:href="@{/user/product/{id}(id=${p.id})}"
   class="btn btn-primary">

Buy Now

</a>

<button th:if="${p.quantity == 0}"
        class="btn btn-secondary" disabled>

Unavailable

</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>
</html>
