<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f1f3f6;
font-family:Segoe UI;
}

/* 🔥 STEP FLOW */
.steps{
display:flex;
justify-content:center;
align-items:center;
margin:30px 0;
}

.step{
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
}

.circle{
width:35px;
height:35px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
background:#d1d5db;
}

.circle.active{
background:#2874f0;
color:white;
}

.circle.done{
background:#22c55e;
color:white;
}

.line{
width:80px;
height:3px;
background:#ccc;
}

/* CARD */
.card-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<!-- 🔥 STEP FLOW -->
<div class="steps">

    <!-- STEP 1 -->
    <div class="step">
        <div th:class="'circle ' + (${step} == 1 ? 'active' : 'done')">
            <span th:text="${step} == 1 ? '1' : '✔'"></span>
        </div>
        <small>Address</small>
    </div>

    <div class="line"></div>

    <!-- STEP 2 -->
    <div class="step">
        <div th:class="'circle ' + (${step} == 2 ? 'active' : '')">
            2
        </div>
        <small>Order Summary</small>
    </div>

    <div class="line"></div>

    <!-- STEP 3 -->
    <div class="step">
        <div class="circle">3</div>
        <small>Payment</small>
    </div>

</div>

<!-- ================= ADDRESS ================= -->
<div class="card-box">

<div class="d-flex justify-content-between">

<h5>Deliver to:</h5>

<button class="btn btn-sm btn-outline-primary" onclick="toggleForm()">
Change
</button>

</div>

<!-- SHOW ADDRESS -->
<div id="addressView">

<p>
<b th:text="${session.loggedInUser.name}"></b><br>

<span th:text="${session.userAddress != null ? session.userAddress : 'No address added'}"></span>
</p>

</div>

<!-- EDIT FORM -->
<div id="addressForm" style="display:none;">

<form action="/user/update-address" method="post">

<textarea name="address" class="form-control mb-2"
placeholder="Enter your address..." required></textarea>

<button type="submit" class="btn btn-success btn-sm">
Save Address
</button>

</form>

</div>

</div>

<!-- ================= ORDER SUMMARY ================= -->
<div class="card-box">

<h5 th:text="${product.productName}"></h5>

<p><b>Price:</b> ₹ <span th:text="${product.price}"></span></p>

<p><b>Stock:</b> <span th:text="${product.quantity}"></span></p>

<form action="/user/payment" method="get">

<input type="hidden" name="productId" th:value="${product.id}">

<label>Quantity</label>
<input type="number" name="qty" value="1" min="1" class="form-control mb-3">

<button type="submit" class="btn btn-primary w-100">
Continue to Payment
</button>

</form>

</div>

</div>

<script>
function toggleForm(){
    document.getElementById("addressView").style.display="none";
    document.getElementById("addressForm").style.display="block";
}
</script>

</body>
</html>
