<!-- ADD SUPPLIER – CENTERED CONTENT -->

<style>
    .content-center{
        display:flex;
        justify-content:center;
        padding:40px 0;
    }

    .add-supplier-card{
        width:520px;
        background: linear-gradient(135deg,#ffe6f0,#e6f0ff);
        padding:35px;
        border-radius:22px;
        box-shadow:0 18px 45px rgba(0,0,0,.25);
    }

    h3{
        margin-bottom:25px;
        color:#1f2937;
        display:flex;
        gap:10px;
    }

    label{
        font-size:14px;
        font-weight:600;
        margin-bottom:6px;
        display:block;
    }

    input, textarea{
        width:100%;
        padding:12px 14px;
        border-radius:18px;
        border:none;
        background:#f5f5f5;
        margin-bottom:18px;
    }

    textarea{ min-height:90px; }

    .actions{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-top:10px;
    }

    .save-btn{
        padding:12px 28px;
        border-radius:30px;
        border:none;
        background:linear-gradient(135deg,#6a82fb,#fc5c7d);
        color:#fff;
        font-weight:600;
    }

    .back-btn{
        text-decoration:none;
        color:#374151;
        font-size:14px;
        display:flex;
        gap:6px;
    }
</style>

<div class="content-center">

    <div class="add-supplier-card">

        <h3><i class="fa-solid fa-truck"></i> Add Supplier</h3>

        <form th:action="@{/suppliers/save}" th:object="${supplier}" method="post">

            <label>Supplier Name</label>
            <input type="text" th:field="*{name}" required>

            <label>Phone</label>
            <input type="text" th:field="*{phone}">

            <label>Email</label>
            <input type="email" th:field="*{email}">

            <label>Address</label>
            <textarea th:field="*{address}"></textarea>

            <div class="actions">
                <a href="/suppliers" class="back-btn">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </a>

                <button class="save-btn">Save Supplier</button>
            </div>

        </form>

    </div>

</div>
