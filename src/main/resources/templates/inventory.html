<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inventory | Textile Inventory</title>

    <!-- COMMON CSS -->
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .content {
            flex: 1;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .card h2 {
            margin-top: 0;
            color: #0d6efd;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .btn {
            padding: 10px 20px;
            background: #198754;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #146c43;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table th, table td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: center;
        }

        table th {
            background: #0d6efd;
            color: white;
        }

        /* Action buttons */
        .btn-edit {
            background: #0d6efd;
            color: white;
            padding: 6px 10px;
            border-radius: 5px;
            text-decoration: none;
            margin-right: 5px;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            padding: 6px 10px;
            border-radius: 5px;
            text-decoration: none;
        }

        .btn-edit:hover {
            background: #084298;
        }

        .btn-delete:hover {
            background: #b02a37;
        }
    </style>
</head>

<body>

<!-- ✅ COMMON TOP BAR -->
<div th:replace="fragments :: topbar"></div>

<div class="layout">

    <!-- ✅ COMMON SIDEBAR -->
    <div th:replace="fragments :: sidebar"></div>

    <!-- MAIN CONTENT -->
    <div class="content">

        <h1>📦 Inventory</h1>
        <p>Manage your textile products here</p>

        <!-- ADD PRODUCT -->
        <div class="card">
            <h2>➕ Add New Product</h2>

            <form th:action="@{/admin/addProduct}" method="post">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" name="name" required>
                </div>

                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" name="quantity" required>
                </div>

                <div class="form-group">
                    <label>Price</label>
                    <input type="number" step="0.01" name="price" required>
                </div>

                <button class="btn" type="submit">Save Product</button>
            </form>
        </div>

        <!-- PRODUCT LIST -->
        <div class="card">
            <h2>📋 Product List</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="p : ${products}">
                        <td th:text="${p.id}"></td>
                        <td th:text="${p.name}"></td>
                        <td th:text="${p.quantity}"></td>
                        <td th:text="${p.price}"></td>
                        <td>
                            <a th:href="@{/admin/editProduct/{id}(id=${p.id})}"
                               class="btn-edit">✏ Edit</a>

                            <a th:href="@{/admin/deleteProduct/{id}(id=${p.id})}"
                               onclick="return confirmDelete()"
                               class="btn-delete">🗑 Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<!-- DELETE CONFIRM -->
<script>
function confirmDelete() {
    return confirm("❌ Are you sure you want to delete this product?");
}
</script>

</body>
</html>
