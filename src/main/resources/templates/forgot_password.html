<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>
<style>
body{height:100vh;display:flex;justify-content:center;align-items:center;
background:linear-gradient(135deg,#fad0c4,#a1c4fd);font-family:Segoe UI;}
.card{width:400px;padding:30px;border-radius:20px;background:#fff;text-align:center;}
input,button{width:100%;padding:12px;margin:12px 0;border-radius:25px;border:none;}
button{background:#6a82fb;color:#fff;font-weight:600;}
</style>
</head>
<body>

<div class="card">
<h2>Forgot Password</h2>
<form action="/admin/change-password" method="get">
<input type="email" placeholder="Enter your email" required>
<button type="submit">Next</button>
</form>
</div>

</body>
</html>
