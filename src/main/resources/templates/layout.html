<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout (content)">
<head>
    <title th:text="${pageTitle} ?: 'Textile Inventory'">Textile Inventory</title>

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f8fafc;
        }
        .layout { display: flex; min-height: calc(100vh - 55px); }
        .sidebar { width: 240px; background: #1f2937; color: white; display: flex; flex-direction: column; }
        .brand { padding: 20px; font-size: 18px; font-weight: 600; display: flex; gap: 10px; }
        .brand i { color: #60a5fa; }
        .sidebar a { padding: 12px 20px; color: #e5e7eb; text-decoration: none; display: flex; gap: 12px; }
        .sidebar a:hover { background: #111827; }

        .topbar{
            height:55px;
            background:#000;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:0 25px;
        }

        .topbar-left, .topbar-right{
            display:flex;
            align-items:center;
        }

        .user-login-btn{
            border:2px solid #fff;
            padding:6px 14px;
            border-radius:6px;
            color:#fff;
            text-decoration:none;
            font-size:14px;
        }

        .user-login-btn:hover{
            background:#fff;
            color:#000;
        }

        .logout-btn{
            color:#fff;
            text-decoration:none;
            font-size:14px;
        }

        .main{
            flex:1;
            padding:30px;
        }
    </style>
</head>

<body>

<!-- ================= TOPBAR ================= -->
<div class="topbar">
    <div class="topbar-left">
        <a href="/user/login" class="user-login-btn">
            <i class="bi bi-person-circle"></i> User Login
        </a>
    </div>

    <div class="topbar-right">
        <a href="/admin/logout" class="logout-btn">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </div>
</div>

<!-- ================= LAYOUT ================= -->
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="brand">
            <i class="bi bi-box-seam-fill"></i> Textile Inventory
        </div>

        <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/products"><i class="bi bi-boxes"></i> Inventory</a>
        <a href="/categories"><i class="bi bi-tags"></i> Categories</a>
        <a href="/admin/orders"><i class="bi bi-cart-check"></i> Orders</a>
        <a href="/customers"><i class="bi bi-people"></i> Customers</a>
        <a href="/suppliers"><i class="bi bi-truck"></i> Suppliers</a>
        <a href="/billing"><i class="bi bi-receipt"></i> Billing</a>
        <a href="/admin/reports"><i class="bi bi-bar-chart"></i> Reports</a>
        <a href="/"><i class="bi bi-arrow-repeat"></i> Switch to Index</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        <!-- 🔥 THIS LOADS admin_orders.html fragment -->
        
        <div th:replace="~{${content}}"></div>
    </div>

</div>

</body>
</html>
